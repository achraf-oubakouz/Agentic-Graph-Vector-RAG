apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-backend
  template:
    metadata:
      labels:
        app: rag-backend
    spec:
      containers:
      - name: backend
        image: rag-backend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        env:
        - name: NEO4J_URI
          valueFrom:
            secretKeyRef:
              name: rag-backend-secrets
              key: NEO4J_URI
        - name: NEO4J_USERNAME
          valueFrom:
            secretKeyRef:
              name: rag-backend-secrets
              key: NEO4J_USERNAME
        - name: NEO4J_PASSWORD
          valueFrom:
            secretKeyRef:
              name: rag-backend-secrets
              key: NEO4J_PASSWORD
        - name: NEO4J_DATABASE
          valueFrom:
            secretKeyRef:
              name: rag-backend-secrets
              key: NEO4J_DATABASE
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: rag-backend-secrets
              key: GEMINI_API_KEY
        - name: LLM_PROVIDER
          value: "gemini"
        - name: GEMINI_MODEL_NAME
          value: "gemini-2.5-flash"
        - name: ENABLE_LLM_SYNTHESIS
          value: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  type: NodePort
  selector:
    app: rag-backend
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30007
