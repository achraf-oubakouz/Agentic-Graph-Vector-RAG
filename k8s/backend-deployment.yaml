apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-backend
  template:
    metadata:
      labels:
        app: rag-backend
    spec:
      containers:
      - name: backend
        image: rag-backend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        env:
        - name: NEO4J_URI
          value: "neo4j+s://f627684a.databases.neo4j.io"         # fill in your bolt+s://xxxx.databases.neo4j.io
        - name: NEO4J_USERNAME
          value: "f627684a"
        - name: NEO4J_PASSWORD
          value: "nSpt66dIrRgvL21UEzdeviX8T7Wub_FO2Da2lnKoHtE"         # fill in your password
        - name: NEO4J_DATABASE
          value: "f627684a"
        - name: GEMINI_API_KEY
          value: "AIzaSyCO8dYeFuzYfRLchcoNVWDRNUDY7ZjoCUo"         # fill in your Gemini API key
        - name: LLM_PROVIDER
          value: "gemini"
        - name: GEMINI_MODEL_NAME
          value: "gemini-2.5-flash"
        - name: ENABLE_LLM_SYNTHESIS
          value: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  type: NodePort
  selector:
    app: rag-backend
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30007
